# Service to expose the PostgreSQL database internally in the cluster
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: appointment
spec:
  selector:
    app: db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# StatefulSet to run a single PostgreSQL pod with persistent storage
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: appointment
spec:
  replicas: 1
  serviceName: db  # required for stable network identity
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      # ensures correct file system permissions for mounted volume
      securityContext:
        fsGroup: 26

      # init container to fix ownership of the volume (Amazon Linux base)
      initContainers:
        - name: volume-permission-fix
          image: amazonlinux:2023
          command: ["sh", "-c", "chown -R 26:26 /var/lib/postgresql/data"]
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data    

      containers:
        - name: db
          image: appointment-db:latest  # local image built from Dockerfile
          imagePullPolicy: Never        # don't try to pull from a registry
          ports:
            - containerPort: 5432

          # pass database config through env vars
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PORT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD

          # probe to check if database is ready
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10

          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data

  # Persistent volume claim so data isn't lost when the pod restarts
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
